name: Apex F1 Web CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      # 💡 린트(문법 검사)와 빌드가 정상적으로 되는지 테스트합니다.
      - name: Check Lint and Build
        run: |
          npm run lint
          npm run build