name: Apex F1 Web CD Pipeline

on:
  workflow_run:
    workflows: ["Apex F1 Web CI Pipeline"]
    types:
      - completed
    branches:
      - main

jobs:
  build-and-push:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    name: Build and Push Docker Image
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/apex-f1-web:latest
            ghcr.io/${{ github.repository_owner }}/apex-f1-web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_KAKAO_JS_KEY=${{ secrets.NEXT_PUBLIC_KAKAO_JS_KEY }}
            NEXT_PUBLIC_TOSS_CLIENT_KEY=${{ secrets.NEXT_PUBLIC_TOSS_CLIENT_KEY }}

  deploy:
    needs: build-and-push
    name: Deploy to EC2
    runs-on: ubuntu-22.04

    steps:
      - name: Deploy to AWS EC2
        uses: appleboy/ssh-action@v1.0.3
        env:
          ENV_FILE_CONTENT: ${{ secrets.ENV_FILE }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          envs: ENV_FILE_CONTENT
          script: |
            echo "[*] 프론트엔드 배포를 시작합니다..."
            cd ~/apex-f1-web

            git fetch --all
            git reset --hard origin/main

            echo "[*] .env 파일 생성 중..."
            echo "$ENV_FILE_CONTENT" > .env

            echo ${{ secrets.GHCR_PAT }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            echo "[*] 최신 프론트엔드 이미지를 Pull 받습니다..."
            docker compose --env-file .env pull

            echo "[*] 도커 컨테이너를 다시 실행합니다..."
            docker compose --env-file .env up -d --force-recreate

            docker image prune -f
            echo "[*] 프론트엔드 자동 배포가 완료되었습니다 :)"